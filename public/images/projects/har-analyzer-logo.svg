<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background matching the detailed icon palette -->
  <rect width="32" height="32" rx="6" fill="#0f2240"/>
  <!-- Magnifying glass circle -->
  <circle cx="13" cy="13" r="7" fill="none" stroke="#7ec8f4" stroke-width="2.5"/>
  <!-- Magnifying glass handle -->
  <line x1="18" y1="18" x2="25" y2="25" stroke="#7ec8f4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mini chart line inside glass -->
  <polyline points="8,15 11,11 14,13 17,9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
