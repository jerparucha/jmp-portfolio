<section class="hero">
  <img class="hero__avatar" src="images/avatar.webp" alt="Jerome Mari Parucha" />
  <div class="hero__info">
    <h1 class="hero__name">Jerome Mari Parucha</h1>
    <p class="hero__title">Software Developer / Technical Support</p>
  </div>
  <div class="hero__actions">
    <a class="hero__btn" href="mailto:jerparucha@gmail.com">Message</a>
    <button class="hero__btn hero__btn--primary" (click)="openResume()">Resume</button>
    <div class="hero__more-wrapper">
      <button class="hero__btn" (click)="toggleMore()" [attr.aria-expanded]="moreOpen()" aria-haspopup="true">{{ linkCopied() ? 'Copied!' : 'More...' }}</button>
      @if (moreOpen()) {
        <div class="hero__dropdown">
          <button class="hero__dropdown-item" (click)="copyLink()">Copy Profile Link</button>
          <a class="hero__dropdown-item" href="https://drive.google.com/uc?export=download&id=1KBZ19RzuWm9fZ726mQAh3uOo6vs1BH4t" target="_blank" rel="noopener" (click)="moreOpen.set(false); notifications.notify('resume_downloaded')">Download Resume</a>
          <a class="hero__dropdown-item" href="https://www.linkedin.com/in/jeromemariparucha/" target="_blank" rel="noopener" (click)="moreOpen.set(false)">LinkedIn</a>
        </div>
      }
    </div>
  </div>
</section>

@if (showResume()) {
  <div class="resume-modal" (click)="closeResume()" role="dialog" aria-modal="true" aria-labelledby="resume-modal-title">
    <div class="resume-modal__dialog" (click)="$event.stopPropagation()">
      <div class="resume-modal__header">
        <span class="resume-modal__title" id="resume-modal-title">Resume — Jerome Mari Parucha</span>
        <a
          class="resume-modal__download"
          href="https://drive.google.com/uc?export=download&id=1KBZ19RzuWm9fZ726mQAh3uOo6vs1BH4t"
          target="_blank"
          rel="noopener"
          aria-label="Download resume"
          (click)="notifications.notify('resume_downloaded')"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </a>
        <button class="resume-modal__close" (click)="closeResume()" aria-label="Close resume">✕</button>
      </div>
      <iframe
        class="resume-modal__frame"
        src="https://drive.google.com/file/d/1KBZ19RzuWm9fZ726mQAh3uOo6vs1BH4t/preview"
        allow="autoplay"
      ></iframe>
    </div>
  </div>
}
