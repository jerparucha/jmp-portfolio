<section class="recent-activity">
  <h2 class="recent-activity__heading">Recent Activity</h2>
  <div class="recent-activity__list">
    @for (project of projects; track project.slug) {
      <a class="recent-activity__card" [routerLink]="['/library', project.slug]">
        <div class="recent-activity__cover"
             [style.backgroundImage]="project.coverImage ? 'url(' + project.coverImage + ')' : null"></div>
        <div class="recent-activity__info">
          <h3 class="recent-activity__name">{{ project.name }}</h3>
          <p class="recent-activity__description">{{ project.description }}</p>
          <div class="recent-activity__tags">
            @for (tag of project.tags; track tag) {
              <span class="recent-activity__tag">{{ tag }}</span>
            }
          </div>
        </div>
      </a>
    }
  </div>
</section>
