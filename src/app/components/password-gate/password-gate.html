<div class="gate">
  <div class="gate__panel">
    <div class="gate__logo">JMP</div>
    <h1 class="gate__title">Jerome Mari Parucha</h1>
    <p class="gate__subtitle">This portfolio is password protected.</p>

    <form class="gate__form" (ngSubmit)="submit()">
      <input
        class="gate__input"
        type="password"
        placeholder="Enter password"
        [ngModel]="input()"
        (ngModelChange)="input.set($event); error.set(false)"
        name="password"
        autocomplete="current-password"
        autofocus
      />
      @if (error()) {
        <p class="gate__error">Incorrect password. Try again.</p>
      }
      <button class="gate__submit" type="submit">Enter</button>
    </form>
  </div>
</div>
