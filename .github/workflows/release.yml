name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            FEATS=$(git log --pretty=format:"%s" $PREV_TAG..HEAD | grep "^feat:" | sed 's/^feat: /- /')
            FIXES=$(git log --pretty=format:"%s" $PREV_TAG..HEAD | grep "^fix:"  | sed 's/^fix: /- /')
            CHORE=$(git log --pretty=format:"%s" $PREV_TAG..HEAD | grep "^chore:" | sed 's/^chore: /- /')
          else
            FEATS=$(git log --pretty=format:"%s" | grep "^feat:"  | sed 's/^feat: /- /')
            FIXES=$(git log --pretty=format:"%s" | grep "^fix:"   | sed 's/^fix: /- /')
            CHORE=$(git log --pretty=format:"%s" | grep "^chore:" | sed 's/^chore: /- /')
          fi
          BODY="## What's new"$'\n'
          [ -n "$FEATS" ] && BODY+="$FEATS"$'\n'
          [ -n "$FIXES" ] && BODY+="$FIXES"$'\n'
          [ -n "$CHORE" ] && BODY+="$CHORE"$'\n'
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}

      - name: Notify Discord — released
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Released ${{ github.ref_name }}\",\"color\":15844367,\"description\":\"A new version is live.\",\"url\":\"https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}]}" \
            "$DISCORD_WEBHOOK_URL"
