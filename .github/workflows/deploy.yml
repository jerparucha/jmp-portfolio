name: CI/CD

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Inject secrets
        run: |
          sed -i "s|DISCORD_WEBHOOK_PLACEHOLDER|${{ secrets.DISCORD_WEBHOOK_RESUME_DOWNLOAD }}|g" src/environments/environment.prod.ts
          sed -i "s|PASSWORD_GATE_PLACEHOLDER|${{ secrets.PASSWORD_GATE }}|g" src/environments/environment.prod.ts

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/jmp-portfolio/browser --project-name=jmp-portfolio --branch=${{ github.ref_name }}

      - name: Notify Discord — success
        if: success() && github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          ENV="${{ github.ref_name == 'master' && 'Production' || 'Staging' }}"
          COLOR="${{ github.ref_name == 'master' && '3066993' || '3447003' }}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Deployed to $ENV\",\"color\":$COLOR,\"description\":\"Branch: \`${{ github.ref_name }}\`\nCommit: \`${GITHUB_SHA:0:7}\`\"}]}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord — failure
        if: failure() && github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Pipeline Failed\",\"color\":15158332,\"description\":\"Branch: \`${{ github.ref_name }}\`\nCommit: \`${GITHUB_SHA:0:7}\`\"}]}" \
            "$DISCORD_WEBHOOK_URL"
